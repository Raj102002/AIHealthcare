name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: healthcare-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: healthcare-ai/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_BACK4APP_APP_ID: ${{ secrets.NEXT_PUBLIC_BACK4APP_APP_ID }}
          NEXT_PUBLIC_BACK4APP_JS_KEY: ${{ secrets.NEXT_PUBLIC_BACK4APP_JS_KEY }}
